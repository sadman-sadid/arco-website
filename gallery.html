            /* ═══════════════════════════════
               GALLERY SECTION
            ═══════════════════════════════ */
            .gallery-section {
                padding: 64px 0 80px;
                background: #fafafa;
            }

            /* Section heading — same style as about/leadership */
            .gallery-heading-wrap {
                text-align: center;
                margin-bottom: 48px;
            }

            .gallery-heading {
                font-family: 'Playfair Display', serif;
                color: #870607;
                font-size: 1.9rem;
                font-weight: 800;
                letter-spacing: 2px;
                text-transform: uppercase;
                display: inline-block;
                position: relative;
            }

            .gallery-heading::after {
                content: '';
                display: block;
                width: 60px;
                height: 3px;
                background: #870607;
                border-radius: 2px;
                margin: 14px auto 0;
            }

            .gallery-subtext {
                font-family: 'Lato', sans-serif;
                font-size: 1rem;
                color: #777;
                margin-top: 18px;
                letter-spacing: 0.3px;
            }

            /* ── Grid ── */
            .gallery-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                padding: 0 16px;
            }

            @media (max-width: 1100px) { .gallery-grid { grid-template-columns: repeat(3, 1fr); } }
            @media (max-width: 720px)  { .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
            @media (max-width: 440px)  { .gallery-grid { grid-template-columns: 1fr; } }

            /* ── Gallery card ── */
            .gallery-card {
                position: relative;
                overflow: hidden;
                border-radius: 12px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.10);
                background: #eee;
                aspect-ratio: 1 / 1;
                cursor: pointer;
            }

            .gallery-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                transition: transform 0.42s ease;
            }

            /* Hover overlay */
            .gallery-card::after {
                content: '\f00e';
                font-family: "Font Awesome 5 Free";
                font-weight: 900;
                font-size: 1.6rem;
                color: #fff;
                position: absolute;
                inset: 0;
                background: rgba(135, 6, 7, 0.55);
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                transition: opacity 0.3s ease;
                border-radius: 12px;
            }

            .gallery-card:hover img {
                transform: scale(1.08);
            }

            .gallery-card:hover::after {
                opacity: 1;
            }

            /* Red top border accent on hover */
            .gallery-card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 3px;
                background: #870607;
                z-index: 2;
                transform: scaleX(0);
                transform-origin: left;
                transition: transform 0.3s ease;
            }

            .gallery-card:hover::before {
                transform: scaleX(1);
            }

            /* ── Image counter badge ── */
            .gallery-count-badge {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                background: #870607;
                color: #fff;
                font-family: 'Lato', sans-serif;
                font-size: 0.85rem;
                font-weight: 700;
                padding: 6px 16px;
                border-radius: 20px;
                margin-bottom: 32px;
                letter-spacing: 0.5px;
            }
